<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン - ワークオフィス谷</title>
    <style>
        body {
            font-family: 'Segoe UI', Meiryo, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #b0b0b0;
            cursor: not-allowed;
        }
        input[type="password"]:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏠 ログイン</h1>
        
        <div class="error" th:if="${param.error}">
            パスワードが違います
        </div>

        <div class="error" th:if="${param.locked}">
            パスワードの入力に複数回失敗したため、しばらくログインできません。<br>
            <span th:text="${param.locked[0]} + '秒後'"></span>に再度お試しください。
        </div>
        
        <form method="post" action="/login">
            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" 
                       placeholder="パスワードを入力" required autofocus
                       th:disabled="${param.locked}">
            </div>
            
            <button type="submit" th:disabled="${param.locked}">ログイン</button>
        </form>
    </div>
<script>
// 二重送信防止：フォーム送信時に送信ボタンを無効化する（確認ダイアログでキャンセルされた場合は何もしない）
document.querySelectorAll('form').forEach(function(form) {
    form.addEventListener('submit', function(e) {
        if (e.defaultPrevented) return;
        var btn = form.querySelector('button[type="submit"], input[type="submit"]');
        if (btn && !btn.disabled) {
            btn.disabled = true;
            if (btn.tagName === 'BUTTON') {
                btn.dataset.origHtml = btn.innerHTML;
                btn.innerHTML = '処理中...';
            }
        }
    });
});

// bfcache（ブラウザの「戻る」で復元された場合）対策：
// 離脱時に無効化されたままのボタンを元に戻す
window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        document.querySelectorAll('button[type="submit"], input[type="submit"]').forEach(function(btn) {
            btn.disabled = false;
            if (btn.tagName === 'BUTTON' && btn.dataset.origHtml) {
                btn.innerHTML = btn.dataset.origHtml;
            }
        });
    }
});
</script>
</body>
</html>
