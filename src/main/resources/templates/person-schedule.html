<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>1-1-2 スケジュール - 家政婦紹介事務所</title>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: #333; }
        h2 { margin: 0 0 12px; color: #333; font-size: 16px; }
        .back-btn { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; text-decoration: none; font-size: 14px; }
        .container { max-width: 1300px; margin: 0 auto; }

        /* 空き検索カード */
        .search-card { background: white; padding: 20px 24px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); margin-bottom: 20px; }
        .search-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .search-row label { font-weight: bold; font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        .search-row select { padding: 9px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .slot-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
        .slot-table th { background: #f0f0f0; color: #555; font-size: 12px; padding: 6px 8px; text-align: left; border: none; }
        .slot-table td { padding: 4px 6px; border: none; }
        .slot-table select { width: 100%; padding: 7px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .slot-table .slot-num { color: #999; font-size: 12px; width: 24px; text-align: center; }
        .filter-checks { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
        .filter-checks label { font-size: 14px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .filter-checks input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #4CAF50; }
        .badge-care { background: #1565C0; color: white; font-size: 11px; padding: 2px 7px; border-radius: 10px; margin-left: 4px; }
        .badge-cook { background: #E65100; color: white; font-size: 11px; padding: 2px 7px; border-radius: 10px; margin-left: 4px; }
        .search-result { margin-top: 16px; }
        .result-tag { display: inline-block; background: #A5D6A7; color: #1B5E20; padding: 5px 14px; border-radius: 20px; font-size: 13px; margin: 4px 4px 0 0; font-weight: bold; }
        .result-none { color: #c62828; font-weight: bold; font-size: 13px; margin-top: 8px; }

        /* スケジュールカード */
        .schedule-card { background: white; padding: 20px 24px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .person-select-row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
        .person-select-row label { font-weight: bold; font-size: 13px; color: #555; }
        .person-select-row select { padding: 9px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; min-width: 280px; }
        .legend { display: flex; gap: 20px; margin-bottom: 12px; font-size: 13px; align-items: center; }
        .legend-box { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #bbb; display: inline-block; vertical-align: middle; margin-right: 4px; }
        .legend-booked { background: #EF9A9A; }
        .legend-free   { background: #A5D6A7; }
        .person-info { font-weight: bold; font-size: 14px; color: #333; margin-bottom: 12px; }

        /* テーブル */
        table { border-collapse: collapse; width: 100%; font-size: 12px; table-layout: fixed; }
        th { background: #4CAF50; color: white; padding: 7px 3px; text-align: center; border: 1px solid #388E3C; }
        th.time-hdr { background: #37474F; width: 180px; }
        td { border: 1px solid #ccc; padding: 3px 2px; text-align: center; overflow: hidden; }
        td.time-col { background: #f5f5f5; font-weight: 600; color: #37474F; white-space: nowrap; font-size: 18px; font-family: 'Georgia', 'Times New Roman', serif; letter-spacing: 0.02em; padding: 6px 10px; }
        td.booked { background: #EF9A9A; }
        td.free   { background: #A5D6A7; }
        .cust-names { font-size: 14px; color: #111; font-weight: bold; line-height: 1.5; word-break: break-all; }
        .empty-msg { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
<div class="header">
    <h1>📅 1-1-2 スケジュール</h1>
    <a href="/person-menu" class="back-btn">← 求職者管理に戻る</a>
</div>

<div class="container">

    <!-- ── 空き検索 ── -->
    <div class="search-card">
        <h2>🔍 空いている求職者を探す</h2>
        <div style="font-size:12px;color:#888;margin-bottom:8px;">
            最大7つの枠（曜日・開始時刻・終了時刻）を指定できます。指定した枠「すべて」に空いている求職者が表示されます。
            2つ目以降は使う分だけ入力してください（未入力の枠は無視されます）。
        </div>
        <table class="slot-table">
            <thead>
                <tr><th style="width:24px;"></th><th>曜日</th><th>開始時刻</th><th>終了時刻</th></tr>
            </thead>
            <tbody>
                <tr th:each="i : ${#numbers.sequence(1, 7)}">
                    <td class="slot-num" th:text="${i}"></td>
                    <td>
                        <select th:id="'searchDay' + ${i}">
                            <option value="" th:selected="${i != 1}">-- 未選択 --</option>
                            <option value="月" th:selected="${i == 1}">月曜日</option>
                            <option value="火">火曜日</option>
                            <option value="水">水曜日</option>
                            <option value="木">木曜日</option>
                            <option value="金">金曜日</option>
                            <option value="土">土曜日</option>
                            <option value="日">日曜日</option>
                        </select>
                    </td>
                    <td>
                        <select th:id="'searchStart' + ${i}">
                            <option value="" th:selected="${i != 1}">-- 未選択 --</option>
                            <option th:each="slot : ${slots}" th:value="${slot.minutes}" th:text="${slot.label}"
                                    th:selected="${i == 1 and slot.minutes == 600}"></option>
                        </select>
                    </td>
                    <td>
                        <select th:id="'searchEnd' + ${i}">
                            <option value="" th:selected="${i != 1}">-- 未選択 --</option>
                            <option th:each="slot : ${slots}" th:value="${slot.minutes}" th:text="${slot.label}"
                                    th:selected="${i == 1 and slot.minutes == 960}"></option>
                        </select>
                    </td>
                </tr>
            </tbody>
        </table>
        <button class="btn-search" onclick="searchAvailable()">検索</button>
        <div class="filter-checks">
            <label><input type="checkbox" id="filterCare"> 介護ヘルパー資格ありのみ</label>
            <label><input type="checkbox" id="filterCook"> 料理好きのみ</label>
        </div>
        <div class="search-result" id="searchResult" style="display:none;"></div>
    </div>

    <!-- ── 個人スケジュール ── -->
    <div class="schedule-card">
        <div class="person-select-row">
            <label>求職者を選択</label>
            <select onchange="if(this.value) location.href='/person/schedule?personId='+this.value">
                <option value="">-- 選択してください --</option>
                <option th:each="p : ${persons}"
                        th:value="${p.id}"
                        th:selected="${selectedPersonId != null and selectedPersonId == p.id}"
                        th:text="${p.lastNameKanji + ' ' + p.firstNameKanji + ' (' + p.lastNameKana + ' ' + p.firstNameKana + ')'}">
                </option>
            </select>
        </div>

        <div th:if="${selectedPersonId != null}">
            <div class="person-info" th:if="${selectedPerson != null}"
                 th:text="${selectedPerson.lastNameKanji + ' ' + selectedPerson.firstNameKanji + ' さんのスケジュール'}"></div>
            <div class="legend">
                <span><span class="legend-box legend-booked"></span>勤務中（埋まっている）</span>
                <span><span class="legend-box legend-free"></span>空いている</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th class="time-hdr">時間</th>
                        <th th:each="day : ${days}" th:text="${day + '曜日'}"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="h : ${hours}">
                        <td class="time-col" th:text="${h + ':00 〜 ' + (h == 23 ? 0 : h+1) + ':00'}"></td>
                        <td th:each="day : ${days}"
                            th:with="key=${day + '_' + h},
                                     booked=${bookedMap != null and bookedMap.containsKey(day + '_' + h)}"
                            th:classappend="${booked} ? 'booked' : 'free'">
                            <th:block th:if="${booked}">
                                <div class="cust-names">
                                    <span th:each="name, stat : ${bookedMap.get(day + '_' + h)}"
                                          th:text="${name}"></span>
                                </div>
                            </th:block>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-msg" th:if="${selectedPersonId == null}">
            求職者を選択するとスケジュールが表示されます
        </div>
    </div>
</div>

<script>
function searchAvailable() {
    // 7枠のうち、曜日・開始・終了がすべて入力されている枠だけを集める
    var slotsInput = [];
    for (var i = 1; i <= 7; i++) {
        var dayEl   = document.getElementById('searchDay' + i);
        var startEl = document.getElementById('searchStart' + i);
        var endEl   = document.getElementById('searchEnd' + i);
        var day     = dayEl.value;
        var start   = startEl.value;
        var end     = endEl.value;
        if (day === '' && start === '' && end === '') continue; // 何も入力していない枠は無視
        if (day === '' || start === '' || end === '') {
            alert((i) + '番目の枠は、曜日・開始時刻・終了時刻をすべて入力するか、すべて未選択のままにしてください');
            return;
        }
        start = parseInt(start);
        end   = parseInt(end);
        if (end <= start) {
            alert((i) + '番目の枠：終了時刻は開始時刻より後にしてください');
            return;
        }
        slotsInput.push({ day: day, start: start, end: end });
    }
    if (slotsInput.length === 0) {
        alert('少なくとも1つは枠を入力してください');
        return;
    }

    var resultDiv = document.getElementById('searchResult');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '<span style="color:#888;font-size:13px;">検索中...</span>';

    var filterCare = document.getElementById('filterCare').checked;
    var filterCook = document.getElementById('filterCook').checked;

    var params = new URLSearchParams();
    slotsInput.forEach(function(s) {
        params.append('days', s.day);
        params.append('starts', s.start);
        params.append('ends', s.end);
    });

    var labelParts = slotsInput.map(function(s) {
        return s.day + '曜日 ' + formatMin(s.start) + '〜' + formatMin(s.end);
    });

    fetch('/person/schedule/search?' + params.toString())
        .then(function(r){ return r.json(); })
        .then(function(data) {
            // フィルター適用（チェックが入っている条件だけ絞り込む）
            var filtered = data.filter(function(p) {
                if (filterCare && p.careHelper !== '1') return false;
                if (filterCook && p.cookingGood !== '1') return false;
                return true;
            });

            // 介護ヘルパー資格あり・料理好きを上位にソート
            filtered.sort(function(a, b) {
                var sa = (a.careHelper === '1' ? 2 : 0) + (a.cookingGood === '1' ? 1 : 0);
                var sb = (b.careHelper === '1' ? 2 : 0) + (b.cookingGood === '1' ? 1 : 0);
                return sb - sa;
            });

            if (filtered.length === 0) {
                resultDiv.innerHTML = '<div class="result-none">⚠ 条件に合う空き求職者はいません</div>';
                return;
            }
            var filterNote = [];
            if (filterCare) filterNote.push('介護ヘルパー資格あり');
            if (filterCook) filterNote.push('料理好き');
            var noteStr = filterNote.length > 0 ? '（絞込：' + filterNote.join('・') + '）' : '';
            var label = labelParts.join('、') + ' の全てに空いている求職者' + noteStr + '：';
            var tags = filtered.map(function(p) {
                var badges = '';
                if (p.careHelper === '1') badges += '<span class="badge-care">介護ヘルパー</span>';
                if (p.cookingGood === '1') badges += '<span class="badge-cook">料理好き</span>';
                return '<span class="result-tag" onclick="jumpToSchedule(' + p.id + ')" style="cursor:pointer;" title="クリックでスケジュール表示">'
                     + p.name + '（' + p.kana + '）' + badges + '</span>';
            }).join('');
            resultDiv.innerHTML = '<div style="font-size:13px;margin-bottom:6px;font-weight:bold;">' + label + '</div>' + tags
                + '<div style="font-size:11px;color:#888;margin-top:8px;">※ 名前をクリックすると下のスケジュール欄に表示します。介護ヘルパー資格あり・料理好きの方が上位表示されます。</div>';
        })
        .catch(function() {
            resultDiv.innerHTML = '<div class="result-none">検索に失敗しました</div>';
        });
}
function formatMin(min) {
    var h = Math.floor(min / 60);
    var m = min % 60;
    return h + ':' + (m === 0 ? '00' : m);
}
function jumpToSchedule(personId) {
    location.href = '/person/schedule?personId=' + personId;
}
</script>
</body>
</html>
