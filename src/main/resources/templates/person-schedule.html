<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>求職者管理スケジュール（1-1-2）</title>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: #333; }
        .back-btn { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; text-decoration: none; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .select-area { margin-bottom: 20px; }
        select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; min-width: 300px; }
        .legend { display: flex; gap: 20px; margin-bottom: 14px; font-size: 13px; align-items: center; }
        .legend-box { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #ccc; display: inline-block; }
        .legend-booked { background: #EF9A9A; }
        .legend-free   { background: #A5D6A7; }
        table { border-collapse: collapse; width: 100%; font-size: 13px; }
        th { background: #4CAF50; color: white; padding: 8px 4px; text-align: center; border: 1px solid #388E3C; }
        th.time-hdr { background: #37474F; }
        td { border: 1px solid #ccc; padding: 4px 3px; text-align: center; min-width: 60px; font-size: 12px; }
        td.time-col { background: #f5f5f5; font-weight: bold; color: #555; white-space: nowrap; min-width: 48px; }
        td.booked { background: #EF9A9A; }
        td.free   { background: #A5D6A7; }
        .customer-name { font-size: 10px; color: #c62828; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; display: block; }
        .empty-msg { text-align: center; padding: 40px; color: #999; }
        .person-info { margin-bottom: 16px; font-size: 14px; color: #333; font-weight: bold; }
    </style>
</head>
<body>
<div class="header">
    <h1>📅 求職者管理スケジュール（1-1-2）</h1>
    <a href="/person-menu" class="back-btn">← 求職者管理に戻る</a>
</div>

<div class="container">
    <div class="select-area">
        <label style="display:block;margin-bottom:6px;font-weight:bold;">求職者を選択</label>
        <select onchange="if(this.value) location.href='/person/schedule?personId='+this.value">
            <option value="">-- 選択してください --</option>
            <option th:each="p : ${persons}"
                    th:value="${p.id}"
                    th:selected="${selectedPersonId != null and selectedPersonId == p.id}"
                    th:text="${p.lastNameKanji + ' ' + p.firstNameKanji + ' (' + p.lastNameKana + ' ' + p.firstNameKana + ')'}">
            </option>
        </select>
    </div>

    <div th:if="${selectedPersonId != null}">
        <div class="person-info" th:if="${selectedPerson != null}">
            <span th:text="${selectedPerson.lastNameKanji + ' ' + selectedPerson.firstNameKanji}"></span> さんのスケジュール
        </div>

        <div class="legend">
            <span><span class="legend-box legend-booked"></span> 勤務中（埋まっている）</span>
            <span><span class="legend-box legend-free"></span> 空いている</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="time-hdr">時間</th>
                    <th th:each="day : ${days}" th:text="${day + '曜日'}">月曜日</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="h : ${hours}">
                    <td class="time-col" th:text="${h + ':00 〜 ' + (h+1) + ':00'}">7:00 〜 8:00</td>
                    <td th:each="day : ${days}"
                        th:with="key=${day + '_' + h}, booked=${bookedMap != null and bookedMap.containsKey(day + '_' + h)}"
                        th:classappend="${booked} ? 'booked' : 'free'">
                        <th:block th:if="${booked}">
                            <span th:each="name : ${bookedMap.get(day + '_' + h)}"
                                  class="customer-name"
                                  th:text="${name}"></span>
                        </th:block>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-msg" th:if="${selectedPersonId == null}">
        求職者を選択するとスケジュールが表示されます
    </div>
</div>
</body>
</html>
