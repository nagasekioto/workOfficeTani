<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>発行済み領収書一覧 - 家政婦紹介事務所</title>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: #333; font-size: 18px; }
        .back-btn { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; text-decoration: none; }
        .container { max-width: 960px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); }

        /* タブ切り替え */
        .tab-row { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #7B1FA2; }
        .tab { padding: 10px 28px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; background: #f3e5f5; color: #7B1FA2; border-radius: 6px 6px 0 0; text-decoration: none; }
        .tab.active { background: #7B1FA2; color: white; }
        .tab:hover:not(.active) { background: #e1bee7; }

        /* フィルタ行 */
        .filter-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-row label { font-weight: bold; color: #555; font-size: 13px; display: block; margin-bottom: 4px; }
        .filter-row input[type="month"],
        .filter-row input[type="number"] { padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .filter-row input[type="number"] { width: 90px; }
        .filter-btn { background: #7B1FA2; color: white; border: none; border-radius: 4px; padding: 9px 20px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .filter-btn:hover { background: #4A148C; }

        /* サマリ */
        .period-label { font-size: 17px; font-weight: bold; color: #4A148C; margin-bottom: 14px; }
        .summary-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 20px; }
        .summary-card { background: #f3e5f5; border-radius: 8px; padding: 14px; text-align: center; }
        .summary-card .label { font-size: 12px; color: #7b1fa2; margin-bottom: 4px; }
        .summary-card .value { font-size: 22px; font-weight: bold; color: #4a148c; }

        /* テーブル */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #7B1FA2; color: white; padding: 10px; text-align: left; white-space: nowrap; }
        td { padding: 8px 10px; border-bottom: 1px solid #e0e0e0; vertical-align: middle; }
        tr:hover { background: #f9f0ff; }
        .total-row { background: #e1bee7; font-weight: bold; }
        .total-row td { border-top: 2px solid #7B1FA2; }
        .badge-customer  { background: #e3f2fd; color: #1565c0; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .badge-jobseeker { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .pdf-link { color: #7B1FA2; font-size: 12px; text-decoration: none; padding: 2px 8px; border: 1px solid #7B1FA2; border-radius: 3px; }
        .pdf-link:hover { background: #7B1FA2; color: white; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .pdf-zip-btn { background: #E53935; color: white; padding: 9px 18px; border: none; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .pdf-zip-btn:hover { background: #b71c1c; }
    </style>
</head>
<body>
<div class="header">
    <h1>&#128203; 発行済み領収書一覧（1-7-1 / 1-7-2）</h1>
    <div style="display:flex;gap:8px;align-items:center;">
        <a th:if="${not #lists.isEmpty(rows)}"
           th:href="${viewMode == 'year'
               ? '/receipt-menu/issued-list/export-pdf?viewMode=year&year=' + selectedYear
               : '/receipt-menu/issued-list/export-pdf?viewMode=month&month=' + selectedMonth}"
           class="pdf-zip-btn">&#128196; PDF一括保存（ZIP）</a>
        <a href="/receipt-menu" class="back-btn">&#8592; 戻る</a>
    </div>
</div>

<div class="container">

    <!-- タブ -->
    <div class="tab-row">
        <a th:href="${tabMonthUrl}" th:classappend="${viewMode == 'month'} ? 'active'" class="tab">月単位</a>
        <a th:href="${tabYearUrl}"  th:classappend="${viewMode == 'year'}  ? 'active'" class="tab">年単位</a>
    </div>

    <!-- 月単位フィルタ -->
    <form th:if="${viewMode == 'month'}" method="get" action="/receipt-menu/issued-list">
        <input type="hidden" name="viewMode" value="month">
        <div class="filter-row">
            <div>
                <label for="month">表示月</label>
                <input type="month" id="month" name="month" th:value="${selectedMonth}">
            </div>
            <button type="submit" class="filter-btn">&#128269; 表示</button>
        </div>
    </form>

    <!-- 年単位フィルタ -->
    <form th:if="${viewMode == 'year'}" method="get" action="/receipt-menu/issued-list">
        <input type="hidden" name="viewMode" value="year">
        <div class="filter-row">
            <div>
                <label for="year">表示年</label>
                <input type="number" id="year" name="year" th:value="${selectedYear}" min="2000" max="2099" placeholder="例：2026">
            </div>
            <button type="submit" class="filter-btn">&#128269; 表示</button>
        </div>
    </form>

    <!-- 結果 -->
    <div>
        <div class="period-label" th:text="${periodLabel + ' の発行済み領収書'}"></div>

        <div class="summary-box">
            <div class="summary-card">
                <div class="label">発行件数</div>
                <div class="value" th:text="${totalCount + '件'}"></div>
            </div>
            <div class="summary-card">
                <div class="label">合計金額</div>
                <div class="value" th:text="${totalAmountStr}"></div>
            </div>
        </div>

        <table th:if="${not #lists.isEmpty(rows)}">
            <thead>
                <tr>
                    <th>領収番号</th>
                    <th>種別</th>
                    <th>相手先</th>
                    <th>金額</th>
                    <th>発行日時</th>
                    <th>PDF再発行</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${rows}">
                    <td th:text="${r.receiptNumber}"></td>
                    <td>
                        <span th:if="${r.receiptType.contains('1-7-1')}"  class="badge-customer"  th:text="${r.receiptType}"></span>
                        <span th:unless="${r.receiptType.contains('1-7-1')}" class="badge-jobseeker" th:text="${r.receiptType}"></span>
                    </td>
                    <td th:text="${r.partyName}"></td>
                    <td th:text="${r.amountStr}"></td>
                    <td th:text="${r.issuedAt != null ? #temporals.format(r.issuedAt, 'MM/dd HH:mm') : (r.issuedDate != null ? r.issuedDate.toString() : '-')}"></td>
                    <td>
                        <a th:if="${r.receiptType.contains('1-7-1')}"
                           th:href="@{/receipt-menu/customer-receipt/pdf(detailId=${r.salesDetailId})}"
                           target="_blank" class="pdf-link">&#128196; PDF</a>
                        <a th:unless="${r.receiptType.contains('1-7-1')}"
                           th:href="@{/receipt-menu/jobseeker-receipt/pdf(detailId=${r.salesDetailId})}"
                           target="_blank" class="pdf-link">&#128196; PDF</a>
                    </td>
                </tr>
                <tr class="total-row">
                    <td colspan="3">合計</td>
                    <td th:text="${totalAmountStr}"></td>
                    <td colspan="2"></td>
                </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${#lists.isEmpty(rows)}"
             th:text="${periodLabel + ' に発行された領収書はありません。'}"></div>
    </div>
</div>
</body>
</html>
